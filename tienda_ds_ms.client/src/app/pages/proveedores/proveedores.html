<h2>🏭 Proveedores</h2>

<div class="toolbar">
  <button (click)="mostrarForm = !mostrarForm">+ Nuevo Proveedor</button>
</div>

<div class="form-card" *ngIf="mostrarForm">
  <h3>Registrar Proveedor</h3>
  <form (ngSubmit)="crear()">
    <input placeholder="Nombre Empresa" [(ngModel)]="nuevo.nombreEmpresa" name="nombreEmpresa" required />
    <input placeholder="NIT" [(ngModel)]="nuevo.nit" name="nit" required />
    <input placeholder="Contacto" [(ngModel)]="nuevo.contacto" name="contacto" />
    <input placeholder="Email" [(ngModel)]="nuevo.email" name="email" />
    <input placeholder="Teléfono" [(ngModel)]="nuevo.telefono" name="telefono" />
    <input placeholder="Dirección" [(ngModel)]="nuevo.direccion" name="direccion" />
    <button type="submit">Guardar</button>
  </form>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th><th>Empresa</th><th>NIT</th><th>Contacto</th><th>Teléfono</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of proveedores">
      <td>{{ p.id }}</td>
      <td>{{ p.nombreEmpresa }}</td>
      <td>{{ p.nit }}</td>
      <td>{{ p.contacto || '-' }}</td>
      <td>{{ p.telefono || '-' }}</td>
    </tr>
  </tbody>
</table>
<p *ngIf="proveedores.length === 0">No hay proveedores registrados.</p>
